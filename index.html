<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>SingaporeScape</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="stylesheet" href="styles/main.css" />
  <!-- Preload the heaviest modules so the browser fetches them in parallel -->
  <link rel="modulepreload" href="src/main.js" />
  <link rel="modulepreload" href="src/game/game.js" />
  <link rel="modulepreload" href="src/data/npcs.js" />
  <link rel="modulepreload" href="src/data/items.js" />
  <link rel="modulepreload" href="src/data/world.js" />
  <link rel="modulepreload" href="src/render/icons.js" />
  <link rel="modulepreload" href="src/render/sprites.js" />
</head>
<body>
  <div id="game-root">
    <!-- World rendering -->
    <canvas id="game-canvas"></canvas>

    <!-- Top-left action / hover text, RuneScape style -->
    <div id="hover-text"></div>

    <!-- On-screen objective tracker (active quest + Slayer task) -->
    <div id="quest-tracker" class="hidden"></div>

    <!-- Current region / zone label (top-centre) -->
    <div id="region-label"></div>

    <!-- Floating XP drops -->
    <div id="xp-drops"></div>

    <!-- Minimap (top-right) -->
    <div id="minimap-panel">
      <button id="minimap-collapse" title="Collapse minimap" aria-label="Collapse minimap">&#9662;</button>
      <canvas id="minimap-canvas" width="160" height="160"></canvas>
      <div id="minimap-compass">N</div>
      <button id="map-btn" title="Open world map (M)">MAP</button>
      <div id="minimap-region"></div>
      <div id="hp-orb" class="orb" title="Hitpoints"><span id="hp-orb-value">10</span></div>
      <div id="prayer-orb" class="orb" title="Prayer points"><span id="prayer-orb-value">1</span></div>
      <div id="spec-orb" class="orb" title="Special attack — click to arm"><span id="spec-orb-value">100</span></div>
      <div id="run-orb" class="orb" title="Run energy">RUN</div>
    </div>

    <!-- Chat box (bottom-left) -->
    <div id="chatbox">
      <div id="chat-head"><span id="chat-title">Chat</span><button id="chat-collapse" title="Collapse chat" aria-label="Collapse chat">&#9662;</button></div>
      <div id="chat-log"></div>
      <div id="chat-tabs">
        <span class="chat-tab active" data-filter="all">All</span>
        <span class="chat-tab" data-filter="game">Game</span>
        <span class="chat-tab" data-filter="combat">Combat</span>
      </div>
    </div>

    <!-- Side panel with tabs (bottom-right) -->
    <div id="sidepanel">
      <div id="panel-head"><span id="panel-title">Inventory</span><button id="panel-collapse" title="Collapse panel" aria-label="Collapse panel">&#9662;</button></div>
      <div id="panel-body">
        <section class="panel-view" data-view="inventory">
          <div id="inventory-grid"></div>
        </section>
        <section class="panel-view hidden" data-view="equipment">
          <div id="equipment-layout"></div>
          <div id="equipment-bonuses"></div>
        </section>
        <section class="panel-view hidden" data-view="skills">
          <div id="skills-grid"></div>
          <div id="skills-total"></div>
          <div id="alignment-readout"></div>
        </section>
        <section class="panel-view hidden" data-view="combat">
          <div id="combat-panel"></div>
        </section>
        <section class="panel-view hidden" data-view="prayer">
          <div id="prayer-panel"></div>
        </section>
        <section class="panel-view hidden" data-view="quests">
          <div id="quest-panel"></div>
        </section>
        <section class="panel-view hidden" data-view="achievements">
          <div id="achievement-panel"></div>
        </section>
        <section class="panel-view hidden" data-view="settings">
          <div id="settings-panel"></div>
        </section>
      </div>
      <div id="panel-tabs">
        <button class="tab-btn active" data-view="inventory" title="Inventory"></button>
        <button class="tab-btn" data-view="equipment" title="Worn Equipment"></button>
        <button class="tab-btn" data-view="skills" title="Skills"></button>
        <button class="tab-btn" data-view="combat" title="Combat Options"></button>
        <button class="tab-btn" data-view="prayer" title="Prayers"></button>
        <button class="tab-btn" data-view="quests" title="Quest Journal"></button>
        <button class="tab-btn" data-view="achievements" title="Achievements"></button>
        <button class="tab-btn" data-view="settings" title="Settings"></button>
      </div>
    </div>

    <!-- Active-combat ability bar (bottom-centre) -->
    <div id="ability-bar">
      <div id="adrenaline" title="Adrenaline — build it by landing and taking hits, spend it on abilities">
        <div id="adrenaline-fill"></div>
        <span id="adrenaline-label">ADRENALINE <b id="adrenaline-val">0%</b></span>
      </div>
      <div id="ability-buttons"></div>
    </div>

    <!-- Right-click context menu -->
    <div id="context-menu" class="hidden"></div>

    <!-- Tooltip -->
    <div id="tooltip" class="hidden"></div>

    <!-- Modal interface (bank, shop, dialogue) -->
    <div id="modal-overlay" class="hidden">
      <div id="modal-window">
        <div id="modal-title"></div>
        <button id="modal-close" title="Close">✕</button>
        <div id="modal-body"></div>
      </div>
    </div>

    <!-- Level-up / important banner -->
    <div id="banner" class="hidden"></div>

    <!-- Persistent in-game co-brand badge -->
    <div id="cobrand" title="A Worthy · in collaboration with Hyco Education">
      <img src="assets/logo.svg" alt="A Worthy" class="cobrand-a" />
      <span class="cobrand-x">&times;</span>
      <img src="assets/hyco.svg" alt="Hyco Education" class="cobrand-h" />
    </div>
  </div>

  <!-- Title / splash screen featuring the A Worthy logo -->
  <div id="splash">
    <div class="splash-inner">
      <img src="assets/logo.svg" alt="A Worthy" class="splash-logo" />
      <h1 class="splash-title">SingaporeScape</h1>
      <p class="splash-sub">An island of adventure &mdash; by <b>A&nbsp;Worthy</b></p>
      <div class="splash-cobrand"><span>in collaboration with</span><img src="assets/hyco.svg" alt="Hyco Education" /></div>
      <button id="splash-enter">Enter Kampong Glam &#9654;</button>
      <p class="splash-controls">Left-click to move &amp; interact &middot; Right-click for more options</p>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
