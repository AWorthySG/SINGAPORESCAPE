<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 170" role="img" aria-label="hyco education">
  <rect width="320" height="170" rx="12" fill="#15273c"/>
  <!-- wordmark: h y c -->
  <text x="40" y="98" font-family="'Trebuchet MS',Arial,sans-serif" font-size="76" font-weight="700"
        letter-spacing="-2" fill="#ffffff">hyc</text>
  <!-- the "o": an open silver ring with an orange dot -->
  <circle cx="206" cy="70" r="30" fill="none" stroke="#dfe6ec" stroke-width="13" stroke-linecap="round"
          stroke-dasharray="160 28" transform="rotate(-50 206 70)"/>
  <circle cx="230" cy="44" r="9" fill="#f5a623"/>
  <!-- EDUCATION -->
  <text x="160" y="150" text-anchor="middle" font-family="'Trebuchet MS',Arial,sans-serif"
        font-size="24" letter-spacing="10" fill="#eef3f7">EDUCATION</text>
</svg>
