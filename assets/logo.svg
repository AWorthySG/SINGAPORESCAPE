<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 340" role="img" aria-label="A Worthy">
  <g fill="#2b5c91">
    <!-- Archway (doorway ring) -->
    <path fill-rule="evenodd" d="M46,212 L46,96 A64,64 0 0 1 174,96 L174,212 L142,212 L142,96 A32,32 0 0 0 78,96 L78,212 Z"/>
    <!-- Plus inside the arch -->
    <rect x="90" y="84" width="40" height="12" rx="3"/>
    <rect x="104" y="70" width="12" height="40" rx="3"/>
  </g>
  <!-- Smile / W -->
  <path d="M52,240 C80,290 98,290 110,258 C122,290 140,290 168,240"
        fill="none" stroke="#2b5c91" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wordmark -->
  <text x="110" y="326" text-anchor="middle" font-family="'Trebuchet MS',Verdana,sans-serif"
        font-size="26" font-weight="700" letter-spacing="6" fill="#2b5c91">A WORTHY</text>
</svg>
